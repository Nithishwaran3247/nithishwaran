<!DOCTYPE html>
<html>
<head>
    <title>Search Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }

        input[type="text"] {
            width: 300px;
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Search</h1>

    <!-- Replace YOUR_FORM_ID with your Formspree form ID -->
    <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
        <input
            type="text"
            name="search_query"
            placeholder="Enter anything..."
            required
        >
        <button type="submit">Search</button>
    </form>

</body>
</html>
