<!DOCTYPE html>
<html>
<head>
    <title>KPRCAS Login Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f4f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
        }

        .logo {
            width: 100px;
            margin-bottom: 15px;
        }

        h2 {
            color: #003366;
            margin-bottom: 20px;
        }

        input[type="text"],
        input[type="password"] {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 95%;
            padding: 10px;
            background-color: #003366;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #0055aa;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <img src="kprcas-logo.png" alt="KPRCAS Logo" class="logo">

        <h2>KPR College of Arts Science & Research</h2>

        <form>
            <input type="text" placeholder="Enter Username" required><br>
            <input type="password" placeholder="Enter Password" required><br><br>

            <button type="submit">Login</button>
        </form>

        <div class="footer">
            © 2026 KPRCAS
        </div>
    </div>

</body>
</html>
